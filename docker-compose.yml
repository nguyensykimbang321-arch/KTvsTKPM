version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bookingpro_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: bookingpro
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d
    networks:
      - bookingpro_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookingpro_backend
    restart: always
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=123456
      - DB_NAME=bookingpro
      - JWT_SECRET=supersecretkey123
      - JWT_EXPIRES_IN=7d
      - VNP_TMNCODE=M0A3F9BU
      - VNP_HASHSECRET=MPPNPL2J1EBUFS44EO4UEV76AHTAYKZH
      - VNP_URL=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - VNP_RETURNURL=http://192.168.1.163:3000/api/v1/app/bookings/vnpay_return
    depends_on:
      - db
    networks:
      - bookingpro_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookingpro_frontend
    restart: always
    ports:
      - '8081:8081'
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/.expo
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=192.168.1.163
    depends_on:
      - backend
    networks:
      - bookingpro_network

volumes:
  mysql_data:

networks:
  bookingpro_network:
    driver: bridge
